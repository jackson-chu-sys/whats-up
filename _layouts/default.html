<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.7; max-width: 800px; margin: 0 auto; padding: 2rem 1rem; color: #333; background: #fafafa; }
    h1, h2, h3 { color: #6b21a8; margin: 1.5em 0 0.5em; }
    h1 { font-size: 2em; }
    a { color: #7c3aed; text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav { margin: 1rem 0; padding: 1rem 0; border-bottom: 2px solid #e9d5ff; }
    nav a { margin-right: 1.5rem; font-weight: 600; }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #e5e7eb; font-size: 0.9rem; color: #9ca3af; }
    blockquote { border-left: 4px solid #e9d5ff; padding-left: 1rem; color: #6b7280; margin: 1rem 0; }
    hr { border: none; border-top: 1px solid #e5e7eb; margin: 2rem 0; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #e5e7eb; padding: 0.5rem; text-align: left; }
    th { background: #f3f0ff; }
    code { background: #f3f0ff; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.9em; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a2e; color: #e5e7eb; }
      h1, h2, h3 { color: #c084fc; }
      blockquote { border-color: #6b21a8; color: #9ca3af; }
      table, th, td { border-color: #374151; }
      th { background: #1e1b4b; }
      footer { border-color: #374151; color: #6b7280; }
      code { background: #1e1b4b; }
      nav { border-color: #4c1d95; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/whats-up/">🏠 Home</a>
    <a href="/whats-up/zh/">🇨🇳 中文</a>
    <a href="/whats-up/en/">🇺🇸 English</a>
    <a href="https://github.com/jackson-chu-sys/whats-up">📂 GitHub</a>
  </nav>
  {{ content }}
  <footer>
    🟣 what's Up! &copy; 2026 · Powered by <a href="https://pages.github.com">GitHub Pages</a>
  </footer>
</body>
</html>

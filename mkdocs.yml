site_name: "🟣 what's Up!"
site_description: 全球热点信息周刊 · Global Weekly Digest
site_author: jackson-chu-sys
repo_url: https://github.com/jackson-chu-sys/whats-up
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: 暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: 亮色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search:
      lang: [zh, en]
  - i18n:
      docs_structure: suffix
      languages:
        - locale: zh
          name: 中文
          build: true
        - locale: en
          name: English
          build: true

nav:
  - 首页: index.md
  - 往期:
      - issues/index.md
